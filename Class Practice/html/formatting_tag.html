<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>different formatting tags</title>
</head>
<body>
    <h1>
        <center>Formatting Tag example</center>
    </h1>
    <hr>
    <b>this is bold </b> <br>
    <i>this is italic</i> <br>
    <u>underline</u> <br>
    <mark>important</mark> <br>
    <big>big but not bold</big> <br>
    <small>small</small> <br>
    <strike>to</strike> <br>
    <del>striking</del> <br>
    X <sub>6</sub> <br>
    Y <sup>6</sup> <br>

</body>
</html>
