<!DOCTYPE html>
<html>
<head>
    <title>CSS Demo</title>

    <style>
        body {
            margin: 40px;              
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: blue;
            font-family: Georgia;      
            border: 2px dotted black; 
            padding: 10px;
        }
        

        hr {
            margin: 20px;              
        }

        input {
            font-size: 18px;           
            margin: 10px;              
            padding: 8px;
            color: black;
        }

        button {
            font-size: 18px;
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <h1>Welcome to CSS Demo</h1>

    <hr> 

    <form>
        <input type="text" placeholder="Enter Name"><br>
        <input type="email" placeholder="Enter Email"><br>
        <input type="password" placeholder="Enter Password"><br>
        <input type="date"><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
